# UnsentPlugin — map placement whitelist
#
# Blocks an unsent note is ALLOWED to be hung on. This is an allow-list: ONLY the blocks
# listed here accept a note. Right-clicking any other block — or a floor/ceiling face — is refused.
#
# This list starts EMPTY on purpose — add only the blocks YOU want. Nothing is added for you.
# Use Bukkit material names (https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html):
#
#   allowed-blocks:
#     - OAK_PLANKS
#     - STONE_BRICKS
#
# Edit live in-game with /unsentadmin whitelist add hand (or add <BLOCK>),
# or edit this file by hand and run /unsentreload to apply it without a restart.
allowed-blocks: []
