# Max characters per message
max-message-length: 80

# Max messages stored per name
max-messages-per-name: 100

# Max messages (note-maps) a single player can make. Each /unsent creates one message and
# one map, so this caps how many a person can author. Players with the unsent.unlimited
# permission (OPs have it by default) can make as many as they want and ignore this limit.
# Set to 0 (or below) to disable the limit for everyone.
# (The old key name `max-maps-per-player` is still read as a fallback if present.)
max-messages-per-player: 10

# Cooldown (in seconds) a player must wait between making maps. Players with the
# unsent.unlimited permission (OPs by default) are exempt. Set to 0 to disable.
creation-cooldown-seconds: 30

# ── Note credits (earn-over-time posting) ────────────────────────────────────
# Players post notes using credits: they start with `start` and earn one more every
# `regen-period`, up to `max`. Each /unsent spends one; an "Unsent Note" paper item in
# the inventory shows the balance. Players with unsent.unlimited are exempt. While this
# is enabled it REPLACES the flat max-messages-per-player limit above.
# regen-period accepts a duration: e.g. 30m, 6h, 1d, 7d, 1w (m=minutes, h=hours, d=days, w=weeks).
note-credits:
  enabled: true
  start: 1
  max: 5
  regen-period: 1w

# ── AI moderation (OpenAI) ───────────────────────────────────────────────────
# A second moderation layer on top of the blocked-words list above. Every message is
# sent to OpenAI, which answers whether it is safe for a 13+ audience (no sexual or
# threatening content) — this catches creative spellings and bypasses the word list misses.
ai-moderation:
  # Master switch. While false, only the blocked-words filter runs (no network calls).
  enabled: false
  # Your OpenAI API key — KEEP THIS SECRET. Required when enabled. Looks like "sk-...".
  api-key: ""
  # Which OpenAI model to use. gpt-4o-mini is cheap, fast, and accurate enough here.
  model: "gpt-4o-mini"
  # How long to wait (seconds) for OpenAI before giving up on a single message.
  timeout-seconds: 8
  # What to do when a check can't complete (bad key, network error, timeout):
  #   true  = reject the message  (safer — recommended for a 13+ server)
  #   false = let it through       (the word filter still applies)
  fail-closed: true

# ── Username validation (real Minecraft accounts) ────────────────────────────
# When enabled, /unsent only accepts a recipient that is a real Minecraft account, checked
# against the APIs below in order — the first that answers decides, and if one is down the
# next is tried. Off by default so offline-mode / creative servers aren't affected.
username-validation:
  enabled: false
  # After ALL providers fail to answer: reject the message (true) or allow it (false).
  fail-closed: true
  # How long (minutes) to remember a name's result before checking it again.
  cache-ttl-minutes: 1440
  # Seconds to wait for each provider before moving on to the next.
  timeout-seconds: 6
  # Providers tried in order. Built-ins: mojang, mojang-services, playerdb, ashcon.
  providers:
    - mojang
    - playerdb
    - ashcon

# Map appearance
map:
  # Default body text size for /unsent notes (clamped 5–24). The "to <name>" header is always 10.
  # Players with unsent.color use /unsentvip to pick a size (10–24) and hex background per note.
  font-size: 10
  # Font used to draw the note. To use a custom (e.g. Minecraft) font, drop a TrueType file at
  # plugins/UnsentPlugin/font.ttf — it takes priority. Otherwise this names a system font family;
  # if that isn't installed it falls back to SansSerif.
  font: "Minecraft"

# Named background colours usable in /unsentvip — e.g. "/unsentvip Steve 16 red hi there".
# Reassign the hex codes to taste (keep the quotes). Players can still pass a raw #RRGGBB hex.
colors:
  red: "#FF5555"
  orange: "#FFA500"
  yellow: "#FFFF55"
  green: "#55FF55"
  blue: "#5555FF"
  purple: "#AA00FF"
  pink: "#FF69B4"
  brown: "#8B5A2B"
  cyan: "#55FFFF"
  black: "#000000"
  gray: "#AAAAAA"

# ── Do not edit below ────────────────────────────────────────────────────────
# Records the plugin version this config was generated for. On startup the plugin
# compares it to the version it ships with and, if they differ, merges in any new
# options (keeping your settings) and re-stamps this value. Leave it alone.
config-version: '1.15.0'
