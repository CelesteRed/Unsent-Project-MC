name: UnsentPlugin
version: '1.15.4'
main: com.unsentplugin.UnsentPlugin
api-version: '26.1.2'
description: Write anonymous unsent messages rendered as in-game maps.

commands:
  unsent:
    description: Send an unsent message to a name.
    usage: /unsent <name> <message>
    permission: unsent.use
    aliases: []
  unsentread:
    description: Read all unsent messages for a name.
    usage: /unsentread <name>
    permission: unsent.read
    aliases: []
  unsentrecover:
    description: Rebuild the renderer on a held unsent map from stored messages.
    usage: /unsentrecover <name> [number]
    permission: unsent.admin
    aliases: []
  unsentadmin:
    description: Admin tools — manage the map placement whitelist.
    usage: /unsentadmin whitelist <add|remove|list|reload> [block|hand]
    permission: unsent.admin
    aliases: []
  unsentreload:
    description: Reload config.yml and whitelist.yml from disk.
    usage: /unsentreload
    permission: unsent.admin
    aliases: []
  unsentvip:
    description: Send a note with a custom text size (10-24) and background colour.
    usage: /unsentvip <name> <size 10-24> <#hexcolor> <message>
    permission: unsent.color
    aliases: []

permissions:
  unsent.use:
    description: Allows sending unsent messages (VIP/OP only by default).
    default: op
  unsent.read:
    description: Allows reading unsent messages.
    default: true
  unsent.admin:
    description: Admin tools (/unsentadmin, /unsentrecover) and bypass placement/frame protection.
    default: op
  unsent.unlimited:
    description: Bypass the per-player message (map) limit.
    default: op
  unsent.color:
    description: Use /unsentvip to pick a custom text size and background colour. Implies unsent.use.
    default: op
    children:
      unsent.use: true
